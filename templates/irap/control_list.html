<h1>Controls</h1>

<ul>
  {% for control in controls %}
    <li>
      <a href="{% url 'irap:control_detail' control.pk %}">
        {{ control.control_id }} - {{ control.name }}
      </a>
    </li>
  {% endfor %}
</ul>
